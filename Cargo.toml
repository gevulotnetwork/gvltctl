[package]
name = "gvltctl"
version = "0.1.2"
edition = "2021"
authors = ["Gevulot Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/gevulotnetwork/gvltctl"
description = "Gevulot Control CLI"

[features]
default = ["ext4"]
ext4 = []
fat32 = ["dep:fatfs", "dep:fscommon", "dep:unix_path"]

[dependencies]
# TODO: change rev to tag when available
gevulot-rs = { git = "https://github.com/gevulotnetwork/gevulot-rs.git", rev = "17c3787d96715b895074ca4118d6ea8135b2aea5" }
mia-installer = { git = "https://github.com/gevulotnetwork/mia.git", tag = "mia-installer-0.2.1" }

bip32 = "0.5.1"
clap = { version = "4", features = ["env", "cargo"] }
clap_complete = "4.5.13"
cosmrs = "0.20"
env_logger = "0.11.5"
rand_core = "0.6.4"
serde = "1"
serde_json = "1"
serde_yaml = "0.9.34"
tokio = { version = "1", features = ["full"] }
toml = "0.8.19"
anyhow = "1"
ctrlc = "3.4"
log = "0.4.22"
mbrman = "0.5"
num_cpus = "1.16.0"
oci-spec = "0.7.0"
tempdir = "0.3.7"
thiserror = "1"
fs_extra = "1"
which = "7"
semver = "1"
cfg-if = "1"
bytesize = "1"

# fat32 dependencies
fatfs = { git = "https://github.com/rafalh/rust-fatfs.git", branch = "master", optional = true }
fscommon = { version = "0.1", optional = true }
unix_path = { version = "1", optional = true }
